<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>موقع تفاعل البث</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; }

        /* تلوين الأساس بالأسود الصافي */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; 
        }

        /* الطبقة الخلفية: تملأ الشاشة بالكامل وتسمح بمرور اللمس */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh; 
            background-image: url('logo-mom.png');
            background-size: cover; 
            background-position: center center;
            background-repeat: no-repeat;
            z-index: -1; 
            pointer-events: none; /* تضمن عدم اعتراض صباع المتابع عند الضغط */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            min-height: 100dvh;
            color: #f1e4d3;
            text-align: center;
            padding: 30px 20px;
            overflow-y: auto;
            background: transparent; 
        }

        @media (max-height: 600px) {
            body {
                justify-content: flex-start;
            }
        }

        /* 🔥 هنا السر: رفع الصندوق فوق الخلفية تماماً لمنع أي تعليق في اللمس */
        .container { 
            width: 100%;
            max-width: 440px; 
            background: rgba(20, 20, 20, 0.85); 
            backdrop-filter: blur(10px); 
            padding: 30px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 170, 0, 0.25);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            margin: auto 0; 
            position: relative;
            z-index: 999; /* يجعل الأزرار في الواجهة دائماً */
        }

        .btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin: 15px 0; 
            font-size: 18px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            background-color: #7289da; 
            color: white; 
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            z-index: 1000;
        }

        .btn:hover { 
            background-color: #5b73c7; 
        }

        .box { 
            display: none; 
            background: rgba(47, 49, 54, 0.9); 
            padding: 20px; 
            border-radius: 14px; 
            margin-top: 20px; 
        }

        /* ✨ تنسيق حقل إدخال الاسم الجديد ليكون متناسقاً مع التصميم */
        .name-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            background-color: #40444b;
            color: white;
            border: 1px solid #202225;
            text-align: center;
            outline: none;
        }
        .name-input:focus {
            border-color: #ffaa00;
        }

        textarea { 
            width: 100%; 
            height: 100px; 
            border-radius: 8px; 
            padding: 12px; 
            font-size: 16px; 
            margin-bottom: 10px; 
            background-color: #40444b; 
            color: white; 
            border: 1px solid #202225; 
            resize: none;
            position: relative;
            z-index: 1001;
        }

        #statusText { color: #faa61a; font-weight: bold; margin-top: 10px; font-size: 17px; }
        h1 { color: #ffaa00; margin-bottom: 5px; font-size: 26px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        p { color: #e0e0e0; font-size: 15px; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <audio id="adminAudio" autoplay></audio>

    <div class="container">
        <h1>أهلاً بك في سوالف ريمي  👋</h1>
        <p>وش حاب نسولف فيه اليوم ؟</p>
        
        <button class="btn" onclick="showSection('storyBox')">📖 ١. اكتب قصة صارت لك</button>
        <button class="btn" onclick="showSection('topicBox')">💬 ٢. اقترح موضوع للنقاش</button>
        <button class="btn" onclick="showSection('micBox')">🎙️ ٣. اطلب صعود مايك</button>

        <div id="storyBox" class="box">
            <h3>اكتب قصتك هنا:</h3>
            <textarea id="storyText" placeholder="اكتب تفاصيل القصة..."></textarea>
            <button class="btn" style="background-color: #0dbfe7;" onclick="submitStory()">إرسال القصة</button>
        </div>

        <div id="topicBox" class="box">
            <h3>ما هو الموضوع الذي تريد طرحه؟</h3>
            <textarea id="topicText" placeholder="اكتب الموضوع باختصار..."></textarea>
            <button class="btn" style="background-color: #0dbfe7;" onclick="submitTopic()">إرسال الموضوع</button>
        </div>

        <div id="micBox" class="box">
            <h3>طلب صعود مايك</h3>
            <input type="text" id="usernameInput" class="name-input" placeholder="اكتب اسمك أو لقبك هنا..." maxlength="25">
            <button id="micBtn" class="btn" style="background-color: #0dbfe7;" onclick="askForMic()">طلب انضمام للقائمة 🎙️</button>
            <div id="statusText"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let localStream;
        let peerConnection;
        
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function showSection(sectionId) {
            document.getElementById('storyBox').style.display = 'none';
            document.getElementById('topicBox').style.display = 'none';
            document.getElementById('micBox').style.display = 'none';
            document.getElementById(sectionId).style.display = 'block';
        }

        function submitStory() {
            const text = document.getElementById('storyText').value;
            if(text.trim() === "") return alert("الرجاء كتابة القصة أولاً!");
            socket.emit('sendStory', text);
            alert("تم إرسال قصتك بنجاح! 🎉");
            document.getElementById('storyText').value = "";
        }

        function submitTopic() {
            const text = document.getElementById('topicText').value;
            if(text.trim() === "") return alert("الرجاء كتابة الموضوع أولاً!");
            socket.emit('sendTopic', text);
            alert("تم إرسال موضوعك بنجاح! 🎉");
            document.getElementById('topicText').value = "";
        }

        /* 🔥 تم التعديل هنا: التحقق من وجود الاسم وإرساله للسيرفر */
        function askForMic() {
            const username = document.getElementById('usernameInput').value.trim();
            if (username === "") {
                return alert("الرجاء كتابة اسمك أولاً قبل طلب المايك! ⚠️");
            }

            // إرسال طلب المايك مع الاسم المكتوب
            socket.emit('requestMic', username);
            
            document.getElementById('statusText').innerText = "تم وضعك في قائمة الانتظار.. انتظر قبول ريمي ⏳";
            document.getElementById('micBtn').disabled = true;
            document.getElementById('micBtn').style.backgroundColor = "#72767d";
            document.getElementById('usernameInput').disabled = true; // قفل خانة الاسم بعد الإرسال لمنع التعديل
        }

        // === منطق ربط الصوت الفعلي من جهة المتابع ===
        socket.on('receiveSignal', async ({ from, signal }) => {
            if (signal.type === 'offer') {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    peerConnection = new RTCPeerConnection(rtcConfig);
                    
                    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                    peerConnection.ontrack = (event) => {
                        console.log("تم استقبال صوت الستريمر بنجاح!");
                        const adminAudio = document.getElementById('adminAudio');
                        if (adminAudio && event.streams && event.streams[0]) {
                            adminAudio.srcObject = event.streams[0];
                        }
                    };

                    peerConnection.onicecandidate = (event) => {
                        if (event.candidate) {
                            socket.emit('sendSignal', { to: from, signal: { type: 'candidate', candidate: event.candidate } });
                        }
                    };

                    await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);

                    socket.emit('sendSignal', { to: from, signal: answer });
                    document.getElementById('statusText').innerText = "🎙️ أنت على المايك الآن مباشر مع ريمي!";
                } catch (err) {
                    console.error("فشل الوصول للمايك:", err);
                    alert("يرجى السماح بصلاحية المايك للمتصفح!");
                }
            } else if (signal.type === 'candidate' && peerConnection) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(signal.candidate));
            }
        });

        socket.on('micStatus', (status) => {
            if(status === 'disconnected') {
                document.getElementById('statusText').innerText = "تم إنزالك من المايك أو رفض الطلب.";
                document.getElementById('micBtn').disabled = false;
                document.getElementById('micBtn').style.backgroundColor = "#0dbfe7";
                document.getElementById('usernameInput').disabled = false; // إعادة تفعيل حقل الاسم عند الخروج
                
                if (localStream) localStream.getTracks().forEach(track => track.stop());
                if (peerConnection) peerConnection.close();
                const adminAudio = document.getElementById('adminAudio');
                if (adminAudio) adminAudio.srcObject = null;
            }
        });

        socket.on('userMicControl', (data) => {
            if (localStream && localStream.getAudioTracks().length > 0) {
                localStream.getAudioTracks()[0].enabled = !data.mute;
                if (data.mute) {
                    document.getElementById('statusText').innerText = "🤫 قام الستريمر بكتم مايكك حالياً.";
                } else {
                    document.getElementById('statusText').innerText = "🎙️ تم تفعيل مايكك، يمكنك التحدث الآن!";
                }
            }
        });
    </script>
</body>
</html>
