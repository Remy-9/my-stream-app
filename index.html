<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>موقع تفاعل البث</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; }

        /* 🔥 هنا جعلنا لون الخلفية والأطراف أسود ملكي صافي */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; 
        }

        /* 💡 الطبقة السحرية: رجعت تفرش وتملأ كامل الشاشة بدون ما تصغر */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh; /* توافق كامل مع أشرطة تصفح الجوال */
            background-image: url('logo-mom.png');
            background-size: cover; /* 👈 رجعت تملأ الشاشة بالكامل وبحجمها الطبيعي الفخم */
            background-position: center center;
            background-repeat: no-repeat;
            z-index: -1; /* تبقى بالخلف دائماً */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* يوسط صندوق الأزرار بدقة */
            min-height: 100dvh;
            color: #f1e4d3;
            text-align: center;
            padding: 30px 20px;
            overflow-y: auto;
            background: transparent; /* جعل البودي شفاف لتظهر الطبقة الخلفية */
        }

        /* إذا كانت شاشة الجوال مقلوبة بالعرض وقصيرة، نرفع الصندوق قليلاً لسهولة التمرير */
        @media (max-height: 600px) {
            body {
                justify-content: flex-start;
            }
        }

        .container { 
            width: 100%;
            max-width: 440px; 
            background: rgba(20, 20, 20, 0.85); 
            backdrop-filter: blur(10px); 
            padding: 30px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 170, 0, 0.25);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            margin: auto 0; 
        }

        .btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin: 15px 0; 
            font-size: 18px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            background-color: #7289da; 
            color: white; 
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover { 
            background-color: #5b73c7; 
        }

        .box { 
            display: none; 
            background: rgba(47, 49, 54, 0.9); 
            padding: 20px; 
            border-radius: 14px; 
            margin-top: 20px; 
        }

        textarea { 
            width: 100%; 
            height: 100px; 
            border-radius: 8px; 
            padding: 12px; 
            font-size: 16px; 
            margin-bottom: 10px; 
            background-color: #40444b; 
            color: white; 
            border: 1px solid #202225; 
            resize: none;
        }

        #statusText { color: #faa61a; font-weight: bold; margin-top: 10px; font-size: 17px; }
        h1 { color: #ffaa00; margin-bottom: 5px; font-size: 26px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        p { color: #e0e0e0; font-size: 15px; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div class="container">

        <p>وش حاب نسولف فيه اليوم ؟</p>
        
        <button class="btn" onclick="showSection('storyBox')">📖 ١. اكتب قصة صارت لك</button>
        <button class="btn" onclick="showSection('topicBox')">💬 ٢. اقترح موضوع للنقاش</button>
        <button class="btn" onclick="showSection('micBox')">🎙️ ٣. اطلب صعود مايك</button>

        <div id="storyBox" class="box">
            <h3>اكتب قصتك هنا:</h3>
            <textarea id="storyText" placeholder="اكتب تفاصيل القصة..."></textarea>
            <button class="btn" style="background-color: #0dbfe7;" onclick="submitStory()">إرسال القصة</button>
        </div>

        <div id="topicBox" class="box">
            <h3>ما هو الموضوع الذي تريد طرحه؟</h3>
            <textarea id="topicText" placeholder="اكتب الموضوع باختصار..."></textarea>
            <button class="btn" style="background-color: #0dbfe7;" onclick="submitTopic()">إرسال الموضوع</button>
        </div>

        <div id="micBox" class="box">
            <h3>طلب صعود مايك</h3>
            <button id="micBtn" class="btn" style="background-color: #0dbfe7;" onclick="askForMic()">طلب انضمام للقائمة 🎙️</button>
            <div id="statusText"></div>
        </div>
    </div>
